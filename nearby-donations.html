<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nearby Donations - FoodShare</title>
    <link rel="stylesheet" href="nearby-donations.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Modal for requesting donation address */
      .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display:flex; align-items:center; justify-content:center; z-index:1000; }
      .modal { background: white; width: 92%; max-width: 480px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); overflow: hidden; }
      .modal-header { padding: 14px 16px; border-bottom: 1px solid #eef2f7; font-weight:700; }
      .modal-body { padding: 12px 16px; }
      .modal-footer { padding: 12px 16px; border-top: 1px solid #eef2f7; display:flex; gap:8px; justify-content:flex-end; }
      .btn { padding: 10px 14px; border-radius: 8px; border: none; cursor: pointer; font-weight:600; }
      .btn.cancel { background:#f3f4f6; color:#374151; }
      .btn.primary { background:#10b981; color:white; }
      .hidden { display:none; }
      textarea#recipient-address { width:100%; min-height:80px; padding:10px; border-radius:8px; border:1px solid #e5e7eb; resize:vertical; }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <a href="dashboard.html" class="back-btn">←</a>
        <h1>Nearby Donations</h1>
        <div class="header-spacer"></div>
      </header>

      <div class="banner">
        <h2>Available Food</h2>
        <p>These items are currently available for pickup in your community.</p>
      </div>

      <!-- Request Address Modal -->
      <div id="request-modal-backdrop" class="modal-backdrop hidden">
        <div class="modal">
          <div class="modal-header">Provide your pickup address</div>
          <div class="modal-body">
            <p>Please enter the address where you would like the donation delivered or picked up. This will be shared with the donor and volunteers.</p>
            <textarea id="recipient-address" placeholder="Enter your address (street, city, any instructions)"></textarea>
          </div>
          <div class="modal-footer">
            <button class="btn cancel" onclick="closeRequestModal()">Cancel</button>
            <button class="btn primary" onclick="submitRequestModal()">Submit Request</button>
          </div>
        </div>
      </div>

      <div class="search-bar" style="background-color: white; border: 1px solid #d1d5db;">
        <span class="search-icon">🔍</span>
        <input 
          type="text" 
          id="search-input"
          placeholder="Search for food, location, or donor..." 
          style="background:transparent; border:none; width:100%; outline:none; font-size:16px;"
        >
      </div>

      <div class="donations-grid" id="donations-feed">
         <p class="loading-text">Loading nearby donations...</p>
      </div>
    </div>

    <script>
      let allDonations = []; // Store data globally for searching

      document.addEventListener('DOMContentLoaded', async () => {
        const userStr = localStorage.getItem('user');
        if (!userStr) {
            window.location.href = 'login.html';
            return;
        }

        await loadNearbyDonations();

        // ATTACH SEARCH LISTENER
        const searchInput = document.getElementById('search-input');
        searchInput.addEventListener('input', (e) => {
            filterDonations(e.target.value);
        });
      });

      async function loadNearbyDonations() {
          const container = document.getElementById('donations-feed');
          
          try {
              const response = await fetch('/api/donations');
              const data = await response.json();

              if (data.success) {
                  // Filter only Available items
                  allDonations = data.donations.filter(d => d.status === 'available');
                  renderList(allDonations, container);
              }
          } catch (error) {
              console.error(error);
              container.innerHTML = '<div class="empty-state">Failed to load donations.</div>';
          }
      }

      function filterDonations(query) {
          const container = document.getElementById('donations-feed');
          const lowerQuery = query.toLowerCase();

          // Filter the global list based on Title, Location, or Donor Name
          const filtered = allDonations.filter(item => {
              return (
                  item.title.toLowerCase().includes(lowerQuery) ||
                  item.pickup_location.toLowerCase().includes(lowerQuery) ||
                  (item.donor_name && item.donor_name.toLowerCase().includes(lowerQuery)) ||
                  (item.food_type && item.food_type.toLowerCase().includes(lowerQuery))
              );
          });

          renderList(filtered, container);
      }

      function renderList(items, container) {
          container.innerHTML = ''; 

          if (items.length === 0) {
              container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">🔍</div>
                    <h3>No results found</h3>
                    <p>Try searching for a different food item or location.</p>
                </div>
              `;
              return;
          }

              items.forEach(item => {
                  const img = item.image_data || 'vegetables.jpg';
                  const date = new Date(item.created_at).toLocaleDateString();

                  const html = `
                    <div class="donation-card">
                      <div class="card-image-container">
                        <img src="${img}" alt="${item.title}" class="card-img" />
                        <span class="status-badge">Available</span>
                      </div>
                  
                      <div class="card-content">
                        <h3 class="card-title">${item.title}</h3>
                    
                        <div class="card-details">
                            <div class="detail-row">
                                <span>📦 ${item.quantity}</span>
                                <span>•</span>
                                <span>${item.food_type || 'Food'}</span>
                            </div>
                            <div class="detail-row">
                                <span>📍 ${item.pickup_location}</span>
                            </div>
                            <div class="detail-row meta">
                                <span>By: ${item.donor_name || 'Donor'}</span>
                                <span>${date}</span>
                            </div>
                        </div>

                        <button class="request-btn" onclick="requestItem(${item.id})">
                          Request This Food
                        </button>
                      </div>
                    </div>
                  `;
                  container.insertAdjacentHTML('beforeend', html);
              });
      }

        let pendingRequestId = null;

        function requestItem(id) {
          // Open modal to collect recipient address
          pendingRequestId = id;
          document.getElementById('recipient-address').value = '';
          document.getElementById('request-modal-backdrop').classList.remove('hidden');
        document.getElementById('recipient-address').focus();
        }

        function closeRequestModal() {
          pendingRequestId = null;
          document.getElementById('request-modal-backdrop').classList.add('hidden');
        }

        async function submitRequestModal() {
          const addr = document.getElementById('recipient-address').value.trim();
          if (!addr) {
            alert('Please enter your address before submitting.');
            return;
          }

          if (!pendingRequestId) {
          alert('No donation selected.');
          closeRequestModal();
          return;
          }

          try {
              const response = await fetch(`/api/donations/${pendingRequestId}/request`, {
                method: 'PUT',
                credentials: 'include',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ recipient_location: addr })
              });
            const result = await response.json();
              
            if (result.success) {
              alert("Request submitted — donor and volunteers will be notified.");
              closeRequestModal();
              await loadNearbyDonations(); // Refresh list
            } else {
              alert('Error: ' + result.message);
            }
          } catch (e) {
            console.error(e);
            alert('Network error');
          }
        }
    </script>
  </body>
</html>
