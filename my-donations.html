<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Activity - FoodShare</title>
    <link rel="stylesheet" href="my-donations.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <a href="dashboard.html" class="back-btn">←</a>
        <h1 id="page-title">My Donations</h1>
        <div style="width: 40px;"></div>
      </header>

      <div class="summary-cards">
        <div class="summary-card">
          <div class="summary-number green" id="count-total">0</div>
          <div class="summary-label">Total</div>
        </div>
        <div class="summary-card">
          <div class="summary-number blue" id="count-active">0</div>
          <div class="summary-label">Active</div>
        </div>
        <div class="summary-card">
          <div class="summary-number grey" id="count-completed">0</div>
          <div class="summary-label">Completed</div>
        </div>
      </div>

      <a href="new-donation.html" class="create-donation-btn" id="create-btn" style="text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px;">
        <span class="plus-icon">+</span>
        <span>Create New Donation</span>
      </a>

      <div class="tabs">
        <button class="tab active" data-tab="active">
          Active <span class="tab-count" id="tab-count-active">(0)</span>
        </button>
        <button class="tab" data-tab="completed">
          Completed <span class="tab-count" id="tab-count-completed">(0)</span>
        </button>
      </div>

      <div class="donations-list" id="active-list">
        <p class="empty-message" style="text-align:center; padding:20px;">Loading...</p>
      </div>

      <div class="donations-list hidden" id="completed-list">
        <p class="empty-message">No completed items yet</p>
      </div>
    </div>

    <!-- Rating Modal for Recipients -->
    <div id="rating-modal" class="rating-modal" style="display:none; position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;">
      <div style="background:#fff;padding:20px;border-radius:8px;max-width:320px;width:90%;text-align:center;">
        <h3>Rate this delivery</h3>
        <div id="star-container" style="font-size:30px; margin:10px 0;">
          <span class="star" data-value="1" style="cursor:pointer;">☆</span>
          <span class="star" data-value="2" style="cursor:pointer;">☆</span>
          <span class="star" data-value="3" style="cursor:pointer;">☆</span>
          <span class="star" data-value="4" style="cursor:pointer;">☆</span>
          <span class="star" data-value="5" style="cursor:pointer;">☆</span>
        </div>
        <button id="submit-rating-btn" style="background:#10b981;color:#fff;padding:8px 16px;border:none;border-radius:4px;">Submit</button>
        <button onclick="closeRatingModal()" style="margin-left:8px;padding:8px 16px;border:none;border-radius:4px;">Cancel</button>
      </div>
    </div>

    <script>
      let currentUserRole = 'donor';

      document.addEventListener('DOMContentLoaded', async () => {
        // 1. Get Current User & Role
        const userStr = localStorage.getItem('user');
        if (!userStr) {
            window.location.href = 'login.html';
            return;
        }
        const currentUser = JSON.parse(userStr);
        currentUserRole = currentUser.role;

        // 2. Adjust Page UI based on Role
        if (currentUserRole === 'recipient') {
            document.getElementById('page-title').textContent = "My Requests";
            document.title = "My Requests - FoodShare";
            document.getElementById('create-btn').style.display = 'none'; // Hide create button for recipients
        }

        // 3. Fetch All Donations
        try {
            const response = await fetch('/api/donations');
            const data = await response.json();

            if (data.success) {
                let myItems = [];

                // 4. FILTER LOGIC
                if (currentUserRole === 'recipient') {
                    // Recipient: Show items where I am the recipient_id
                    // (These are items I clicked "Request" on)
                    myItems = data.donations.filter(d => d.recipient_id === currentUser.id);
                } else {
                    // Donor: Show items I created
                    myItems = data.donations.filter(d => d.user_id === currentUser.id);
                }
                
                allMyItems = myItems;
                renderItems(myItems);
            }
        } catch (error) {
            console.error('Error loading data:', error);
            document.getElementById('active-list').innerHTML = '<p class="empty-message">Error loading data.</p>';
        }
      });

      function renderItems(items) {
          const activeList = document.getElementById('active-list');
          const completedList = document.getElementById('completed-list');
          
          activeList.innerHTML = '';
          completedList.innerHTML = '';

          let activeCount = 0;
          let completedCount = 0;

          if (items.length === 0) {
              const msg = currentUserRole === 'recipient' 
                  ? "You haven't requested any donations yet." 
                  : "You haven't made any donations yet.";
              activeList.innerHTML = `<p class="empty-message" style="text-align:center; color:#888;">${msg}</p>`;
          }

          items.forEach(item => {
              // Logic for "Active" vs "Completed"
              // Active = available, requested, or in-transit
              // Completed = completed
              const isActive = item.status !== 'completed';
              
              if (isActive) activeCount++;
              else completedCount++;

              const img = item.image_data || 'vegetables.jpg'; 
              const dateObj = new Date(item.created_at);
              const dateStr = dateObj.toLocaleDateString();

              // prepare a map location for recipients (prefer donation pickup_location provided by donor, fallback to donor_profile location)
              const mapLocation = item.pickup_location || item.donor_location || '';

              // For Recipients, show "Donor: Name"
              // For Donors, show "Pickup: Location" or similar
              let subDetail = '';
              if (currentUserRole === 'recipient') {
                  subDetail = `<p style="font-size:12px; color:#888;">Donor: ${item.donor_name || 'Community Member'}</p>`;
              } else {
                  // If I'm a donor and someone requested it, show that status clearly
                  if (item.status === 'requested') {
                      subDetail = `<p style="font-size:12px; color:#e11d48; font-weight:600;">Action Required: Donation Requested!</p>`;
                  }
              }

              // include delete button for donors on their own items
              const deleteButton = currentUserRole === 'donor' ?
                `<button class="delete-btn" onclick="deleteDonation(${item.id})" style="margin-left:8px; background:#ef4444;color:#fff;border:none;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:12px;">Delete</button>`
                : '';

              // make the whole item clickable for recipients:
              // - active items: open map if location exists
              // - completed items: open rating modal if not yet rated
              let clickableAttr = '';
              if (currentUserRole === 'recipient') {
                  if (isActive && mapLocation) {
                      clickableAttr = `onclick="viewOnMap('${encodeURIComponent(mapLocation)}')" style="cursor:pointer;"`;
                  } else if (!isActive && !item.donor_rating) {
                      clickableAttr = `onclick="openRatingModal(${item.id});" style="cursor:pointer;"`;
                  }
              }

              const html = `
                <div class="donation-item" ${clickableAttr}>
                  <img src="${img}" alt="${item.title}" class="donation-image" style="object-fit:cover;" />
                  <div class="donation-content">
                    <h3>${item.title}</h3>
                    <div class="donation-details">
                      <div class="detail-item">
                        <span class="detail-icon">📦</span>
                        <span>${item.quantity}</span>
                      </div>
                      <div class="detail-item">
                        <span class="detail-icon">📍</span>
                        <span>${item.pickup_location}</span>
                      </div>
                    </div>
                    ${subDetail}
                    ${!isActive && currentUserRole === 'recipient' && !item.donor_rating ? '<p style="font-size:12px;color:#059669;font-weight:600;">Tap to rate</p>' : ''}
                    ${!isActive && currentUserRole === 'recipient' && item.donor_rating ? `<p style="font-size:12px;color:#888;">Rated: ${item.donor_rating}★</p>` : ''}
                    <p class="created-date">Posted ${dateStr}</p>
                  </div>
                  <div class="donation-actions">
                    <span class="status-badge ${item.status}">${item.status}</span>
                    ${deleteButton}
                  </div>
                </div>
              `;

              if (isActive) {
                  activeList.insertAdjacentHTML('beforeend', html);
              } else {
                  completedList.insertAdjacentHTML('beforeend', html);
              }
          });

          // Update Counters
          document.getElementById('count-total').textContent = items.length;
          document.getElementById('count-active').textContent = activeCount;
          document.getElementById('count-completed').textContent = completedCount;
          
          document.getElementById('tab-count-active').textContent = `(${activeCount})`;
          document.getElementById('tab-count-completed').textContent = `(${completedCount})`;
      }

            // delete handler needs access to the current items
            let allMyItems = [];

            async function deleteDonation(donationId) {
              const cnf = confirm('Are you sure you want to delete this donation? This cannot be undone.');
              if (!cnf) return;

              try {
                const resp = await fetch(`/api/donations/${donationId}`, {
                  method: 'DELETE',
                  credentials: 'include',
                  headers: { 'Content-Type': 'application/json' }
                });
                const result = await resp.json();
                if (result.success) {
                  // remove from local list and rerender
                  allMyItems = allMyItems.filter(i => i.id !== donationId);
                  renderItems(allMyItems);
                } else {
                  alert(result.message || 'Failed to delete donation.');
                }
              } catch (err) {
                console.error('Delete error', err);
                alert('Network error deleting donation.');
              }
            }

              function viewOnMap(encodedLocation) {
                if (!encodedLocation) {
                  alert('Location not available for this donation.');
                  return;
                }
                const url = 'https://www.google.com/maps/search/?api=1&query=' + encodedLocation;
                window.open(url, '_blank');
              }

      // Tab switching
      const tabs = document.querySelectorAll('.tab');
      const activeList = document.getElementById('active-list');
      const completedList = document.getElementById('completed-list');

      // rating helpers
      let currentRatingDonationId = null;
      let currentRating = 0;

      function openRatingModal(donationId) {
          currentRatingDonationId = donationId;
          currentRating = 0;
          updateStarDisplay(0);
          document.getElementById('rating-modal').style.display = 'flex';
      }

      function closeRatingModal() {
          document.getElementById('rating-modal').style.display = 'none';
      }

      function updateStarDisplay(count) {
          const stars = document.querySelectorAll('#star-container .star');
          stars.forEach(s => {
              const v = parseInt(s.getAttribute('data-value'), 10);
              s.textContent = v <= count ? '★' : '☆';
          });
      }

      document.querySelectorAll('#star-container .star').forEach(star => {
          star.addEventListener('click', () => {
              const val = parseInt(star.getAttribute('data-value'), 10);
              currentRating = val;
              updateStarDisplay(val);
          });
      });

      document.getElementById('submit-rating-btn').addEventListener('click', async () => {
          if (!currentRating) {
              alert('Please select a star rating.');
              return;
          }
          try {
              const resp = await fetch(`/api/donations/${currentRatingDonationId}/rate`, {
                  method: 'PUT',
                  credentials: 'include',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ rating: currentRating })
              });
              const result = await resp.json();
              if (result.success) {
                  alert('Thank you for your rating!');
                  closeRatingModal();
                  // reload page to refresh my items/stats
                  window.location.reload();
              } else {
                  alert(result.message || 'Could not submit rating.');
              }
          } catch (err) {
              console.error('Rating error', err);
              alert('Network error');
          }
      });

      tabs.forEach((tab) => {
        tab.addEventListener('click', () => {
          tabs.forEach((t) => t.classList.remove('active'));
          tab.classList.add('active');

          if (tab.dataset.tab === 'active') {
            activeList.classList.remove('hidden');
            completedList.classList.add('hidden');
          } else {
            activeList.classList.add('hidden');
            completedList.classList.remove('hidden');
          }
        });
      });
    </script>
  </body>
</html>
