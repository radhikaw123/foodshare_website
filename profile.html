<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile - FoodShare</title>
    <link rel="stylesheet" href="profile.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <a href="dashboard.html" class="back-btn">←</a>
        <h1>Profile</h1>
        <div style="width: 40px;"></div>
      </header>

      <div class="profile-card">
        <div class="profile-header">
          <div class="profile-picture-container">
            <img src="profile.jpg" alt="Profile" class="profile-picture" id="display-image" />
            <div class="camera-icon">📷</div>
          </div>
          <div class="profile-info">
            <h2 id="display-name">Loading...</h2>
            <p class="email" id="display-email">...</p>
            
            <div class="badge-row">
              <span class="role-badge" id="display-role">User</span>
              <div class="rating" id="rating-display" style="display:none;">
                <span class="star">⭐</span>
                <span class="rating-value">4.9</span>
              </div>
            </div>
            <p style="font-size: 13px; color: #6b7280; margin-top: 4px;" id="display-location"></p>
          </div>
        </div>
        
        <button class="edit-profile-btn" onclick="window.location.href='edit-profile.html'">
          <span class="edit-icon"></span>
          <span>Edit Profile</span>
        </button>
      </div>

      <div class="impact-card">
        <div class="card-header">
          <span class="ribbon-icon">🏆</span>
          <h3>Your Impact</h3>
        </div>
        <div class="impact-stats">
          <div class="impact-stat-item">
            <div class="stat-icon green">📦</div>
            <div class="stat-value green">15</div>
            <div class="stat-label">Total Donations</div>
          </div>
          <div class="impact-stat-item">
            <div class="stat-icon blue">👥</div>
            <div class="stat-value blue">47</div>
            <div class="stat-label">People Helped</div>
          </div>
          <div class="impact-stat-item">
            <div class="stat-icon yellow">⭐</div>
            <div class="stat-value orange">4.9</div>
            <div class="stat-label">Rating</div>
          </div>
        </div>
      </div>

      <div class="achievements-card">
        <div class="card-header">
          <span class="ribbon-icon">🏆</span>
          <h3>Achievements</h3>
        </div>
        <div class="achievements-list">
          <div class="achievement-item">
            <div class="achievement-icon yellow">⭐</div>
            <div class="achievement-content">
              <h4>First Donation</h4>
              <p>Created your first food donation</p>
            </div>
          </div>
          <div class="achievement-item">
            <div class="achievement-icon yellow">🤝</div>
            <div class="achievement-content">
              <h4>Community Helper</h4>
              <p>Helped 10+ people in need</p>
            </div>
          </div>
          <div class="achievement-item">
            <div class="achievement-icon green">♻️</div>
            <div class="achievement-content">
              <h4>Waste Warrior</h4>
              <p>Saved 50kg+ from waste</p>
            </div>
          </div>
        </div>
      </div>

      <div class="actions-section">
        <button class="action-btn logout-action" id="logoutBtn">
          <span class="action-icon">🚪</span>
          <span>Logout</span>
        </button>
      </div>

      <p class="member-since">Member since January 2024</p>
    </div>

    <script>
      // 1. LOAD PROFILE DATA
      document.addEventListener('DOMContentLoaded', async () => {
        // Retrieve the user string from localStorage
        const userStr = localStorage.getItem('user');

        if (userStr) {
          const user = JSON.parse(userStr);

          // Update Text
          document.getElementById('display-name').textContent = user.full_name || 'Guest User';
          document.getElementById('display-email').textContent = user.email || '';
          document.getElementById('display-role').textContent = (user.role || 'User').toUpperCase();
          
          if(user.location) {
             document.getElementById('display-location').textContent = '📍 ' + user.location;
          }

          // Update Image (New Logic)
          if (user.profile_image) {
              document.getElementById('display-image').src = user.profile_image;
          }

          // refresh user data from server in case rating changed
          try {
            const vresp = await fetch('/api/verify', { credentials: 'include' });
            const vdata = await vresp.json();
            if (vdata.success && vdata.user) {
              user.rating_sum = vdata.user.rating_sum;
              user.rating_count = vdata.user.rating_count;
              localStorage.setItem('user', JSON.stringify(vdata.user));
            }
          } catch (e) { /* ignore */ }

          // once we have user info, fetch impact metrics
          updateImpactMetrics(user);
        } else {
          window.location.href = 'login.html';
        }
      });

      // compute & update impact statistics depending on role
      async function updateImpactMetrics(user) {
        try {
          const resp = await fetch('/api/donations');
          const data = await resp.json();
          let all = [];
          if (data.success && Array.isArray(data.donations)) {
            all = data.donations;
          } else if (Array.isArray(data)) {
            all = data;
          }
          let total = 0;
          let people = 0;

          if (user.role === 'donor') {
            const mine = all.filter(d => d.user_id === user.id);
            total = mine.length;
            people = new Set(mine.filter(d => d.recipient_id).map(d => d.recipient_id)).size;
          } else if (user.role === 'volunteer') {
            const mine = all.filter(d => d.volunteer_id === user.id);
            total = mine.length;
            people = new Set(mine.filter(d => d.recipient_id).map(d => d.recipient_id)).size;
          } else if (user.role === 'recipient') {
            const mine = all.filter(d => d.recipient_id === user.id);
            total = mine.length;
            people = new Set(mine.map(d => d.user_id)).size;
          }

          const totalElem = document.querySelector('.impact-card .stat-value.green');
          const peopleElem = document.querySelector('.impact-card .stat-value.blue');
          const totalLabel = document.querySelector('.impact-card .stat-label:nth-child(3)'); // nth-child hack might not work
          // better grab by text?
          // We'll just update text directly below

          totalElem.textContent = total;
          peopleElem.textContent = people;

          const labelElems = document.querySelectorAll('.impact-card .stat-label');
          if (user.role === 'recipient') {
            labelElems[0].textContent = 'Total Requests';
            labelElems[1].textContent = 'Donors Helped';
          } else {
            labelElems[0].textContent = 'Total Donations';
            labelElems[1].textContent = 'People Helped';
          }

          // update rating value and visibility based on role
          const ratingDisplay = document.getElementById('rating-display');
          const ratingElem = document.querySelector('.profile-card .rating .rating-value');
          
          // Only show rating for donors and volunteers (recipients don't get rated)
          if (user.role === 'recipient') {
            ratingDisplay.style.display = 'none';
          } else {
            ratingDisplay.style.display = 'flex';
            // Show rating only if user has received at least one rating
            if (user.rating_count && user.rating_count > 0) {
              const avg = (user.rating_sum / user.rating_count).toFixed(1);
              ratingElem.textContent = avg;
            } else {
              // No ratings yet - show 0 for now
              ratingElem.textContent = '0';
            }
          }
        } catch (err) {
          console.error('Error loading impact metrics', err);
        }
      }

      // 2. LOGOUT FUNCTIONALITY
      document.getElementById('logoutBtn').addEventListener('click', async () => {
        try {
          const response = await fetch('/api/logout', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            credentials: 'include'
          });
          
          const data = await response.json();
          
          if (data.success) {
            // Clear localStorage
            localStorage.removeItem('user');
            localStorage.removeItem('session_token');
            
            // Redirect to login page
            window.location.href = 'login.html';
          } else {
            alert('Logout failed. Please try again.');
          }
        } catch (error) {
          console.error('Logout error:', error);
          // Force logout on error
          localStorage.removeItem('user');
          localStorage.removeItem('session_token');
          window.location.href = 'login.html';
        }
      });
    </script>
  </body>
</html>
