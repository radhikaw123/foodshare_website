<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Donations - FoodShare</title>
    <link rel="stylesheet" href="all-donations.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <a href="dashboard.html" class="back-btn">←</a>
        <h1 id="page-title">All Donations</h1>
        <div style="width: 40px;"></div>
      </header>

      <div class="filter-section">
        <div class="filter-group">
          <select id="status-filter" class="filter-select">
            <option value="all">All Status</option>
            <option value="available">Available</option>
            <option value="requested">Requested</option>
            <option value="in-transit">In Transit</option>
            <option value="completed">Completed</option>
          </select>
        </div>
        <div class="search-box">
          <input 
            type="text" 
            id="search-input" 
            placeholder="Search donations..." 
            class="search-input"
          />
          <span class="search-icon">🔍</span>
        </div>
      </div>

      <div class="summary-cards">
        <div class="summary-card">
          <div class="summary-number" id="count-total">0</div>
          <div class="summary-label">Total</div>
        </div>
        <div class="summary-card">
          <div class="summary-number available" id="count-available">0</div>
          <div class="summary-label">Available</div>
        </div>
        <div class="summary-card">
          <div class="summary-number requested" id="count-requested">0</div>
          <div class="summary-label">Requested</div>
        </div>
        <div class="summary-card">
          <div class="summary-number completed" id="count-completed">0</div>
          <div class="summary-label">Completed</div>
        </div>
      </div>

      <div class="donations-container">
        <div class="donations-grid" id="donations-grid">
          <p class="empty-message" style="text-align:center; padding:20px; grid-column: 1 / -1;">Loading...</p>
        </div>
      </div>
    </div>

    <script>
      let allDonations = [];
      let filteredDonations = [];
      let currentUser = null; // track logged-in volunteer

      document.addEventListener('DOMContentLoaded', async () => {
        // Check user is logged in and is a volunteer
        const userStr = localStorage.getItem('user');
        if (!userStr) {
          window.location.href = 'login.html';
          return;
        }

        const currentUser = JSON.parse(userStr);
        window.currentUser = currentUser;
        
        // Redirect non-volunteers to my-donations.html
        if (currentUser.role !== 'volunteer') {
          window.location.href = 'my-donations.html';
          return;
        }

        // Load all donations
        await loadAllDonations();

        // Setup event listeners
        setupFilterListeners();
      });

      async function loadAllDonations() {
        const grid = document.getElementById('donations-grid');
        grid.innerHTML = '<p class="empty-message" style="text-align:center; padding:20px; grid-column: 1 / -1;">Loading...</p>';

        try {
          const response = await fetch('/api/donations/all', { credentials: 'include' });
          const data = await response.json();

          if (data.success) {
            allDonations = data.donations;
            filteredDonations = [...allDonations];
            renderDonations();
            updateSummary();
          } else {
            grid.innerHTML = '<p class="empty-message">Failed to load donations</p>';
          }
        } catch (error) {
          console.error('Error loading donations:', error);
          grid.innerHTML = '<p class="empty-message">Error loading donations. Please try again.</p>';
        }
      }

      function setupFilterListeners() {
        const statusFilter = document.getElementById('status-filter');
        const searchInput = document.getElementById('search-input');

        statusFilter.addEventListener('change', () => {
          applyFilters();
        });

        searchInput.addEventListener('input', () => {
          applyFilters();
        });
      }

      function applyFilters() {
        const status = document.getElementById('status-filter').value;
        const searchTerm = document.getElementById('search-input').value.toLowerCase();

        filteredDonations = allDonations.filter(donation => {
          const matchStatus = status === 'all' || donation.status === status;
          const matchSearch = 
            donation.title.toLowerCase().includes(searchTerm) ||
            donation.description.toLowerCase().includes(searchTerm) ||
            donation.food_type.toLowerCase().includes(searchTerm) ||
            donation.donor_name.toLowerCase().includes(searchTerm) ||
            (donation.receiver_name && donation.receiver_name.toLowerCase().includes(searchTerm));

          return matchStatus && matchSearch;
        });

        renderDonations();
      }

      function renderDonations() {
        const grid = document.getElementById('donations-grid');
        grid.innerHTML = '';

        if (filteredDonations.length === 0) {
          grid.innerHTML = '<p class="empty-message" style="text-align:center; padding:20px; grid-column: 1 / -1;">No donations found</p>';
          return;
        }

        filteredDonations.forEach(donation => {
          const card = createDonationCard(donation);
          grid.insertAdjacentHTML('beforeend', card);
          
          // Add click event to the card
          const cardElement = grid.lastElementChild;
          cardElement.addEventListener('click', () => {
            window.location.href = `donation-detail.html?id=${donation.id}`;
          });
          cardElement.style.cursor = 'pointer';
        });
      }

      function createDonationCard(donation) {
        const img = donation.image_data || 'vegetables.jpg';
        const dateObj = new Date(donation.created_at);
        const dateStr = dateObj.toLocaleDateString();
        const timeStr = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        const statusColor = {
          'available': '#10b981',
          'requested': '#f59e0b',
          'in-transit': '#3b82f6',
          'completed': '#6b7280'
        };

        const receiverSection = donation.status !== 'available' && donation.receiver_name 
          ? `
            <div class="donation-person receiver">
              <div class="person-label">Receiver</div>
              <div class="person-name">${donation.receiver_name}</div>
              <div class="person-location">${donation.receiver_location || 'Location not specified'}</div>
            </div>
          `
          : '';

        // volunteer acceptance controls
        // volunteer can only accept donations that have been requested by a recipient
        let actionSection = '';
        if (donation.status === 'requested' && !donation.volunteer_id) {
          actionSection = `<button class="accept-btn" onclick="acceptDonation(${donation.id});event.stopPropagation();">Accept</button>`;
        } else if (donation.volunteer_id === currentUser?.id) {
          actionSection = `<span class="accepted-label">Assigned to you</span>`;
        } else if (donation.volunteer_id) {
          actionSection = `<span class="accepted-label">Taken</span>`;
        }

        return `
          <div class="donation-card">
            <div class="card-image-wrapper">
              <img src="${img}" alt="${donation.title}" class="donation-image" />
              <div class="status-badge" style="background-color: ${statusColor[donation.status]};">
                ${donation.status.replace('-', ' ').toUpperCase()}
              </div>
            </div>
            
            <div class="card-content">
              <h3 class="donation-title">${donation.title}</h3>
              
              <div class="donation-meta">
                <div class="meta-item">
                  <span class="meta-icon">🏷️</span>
                  <span>${donation.food_type}</span>
                </div>
                <div class="meta-item">
                  <span class="meta-icon">📦</span>
                  <span>${donation.quantity}</span>
                </div>
              </div>

              <p class="description">${donation.description || 'No description provided'}</p>

              <div class="donation-persons">
                <div class="donation-person donor">
                  <div class="person-label">Donor</div>
                  <div class="person-name">${donation.donor_name}</div>
                  <div class="person-location">📍 ${donation.pickup_location}</div>
                </div>
                ${receiverSection}
              </div>

              <div class="card-footer">
                <div class="posted-info">
                  <span class="posted-date">📅 ${dateStr}</span>
                  <span class="best-before" ${donation.best_before_date ? '' : 'style="display:none;"'}>
                    ⏰ Best before: ${donation.best_before_date}
                  </span>
                </div>
                <div class="card-action">
                  ${actionSection}
                </div>
              </div>
            </div>
          </div>
        `;
      }

      function acceptDonation(donationId) {
          if (!confirm('Do you want to accept this donation?')) return;
          fetch(`/api/donations/${donationId}/accept`, {
            method: 'PUT',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' }
          })
          .then(r => r.json())
          .then(result => {
            if (result.success) {
              alert('Donation accepted');
              loadAllDonations();
            } else {
              alert(result.message || 'Unable to accept donation');
            }
          })
          .catch(err => {
            console.error('Accept error', err);
            alert('Network error');
          });
      }

      function updateSummary() {
        const totalCount = allDonations.length;
        const availableCount = allDonations.filter(d => d.status === 'available').length;
        const requestedCount = allDonations.filter(d => d.status === 'requested').length;
        const completedCount = allDonations.filter(d => d.status === 'completed').length;

        document.getElementById('count-total').textContent = totalCount;
        document.getElementById('count-available').textContent = availableCount;
        document.getElementById('count-requested').textContent = requestedCount;
        document.getElementById('count-completed').textContent = completedCount;
      }
    </script>
  </body>
</html>
